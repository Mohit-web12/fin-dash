<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fin Dash — vintage instrument concept</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Instrument+Sans:wght@400;500;600&display=swap');

  :root{
    --wood-0:#17100b;
    --wood-1:#241812;
    --wood-2:#30211a;
    --oxblood:#8a3330;
    --brass:#c6a45c;
    --brass-hi:#e8d09a;
    --brass-lo:#8a6d34;
    --cream:#ece1c9;
    --green:#40685600;
    --racing:#3e6957;
    --ink:#efe6d2;
    --ink-muted:#a3906f;
    --ink-dial:#2a1c12;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Instrument Sans',sans-serif;
    color:var(--ink);
    background:
      radial-gradient(120% 90% at 50% -10%, #2c1e15 0%, #1c130d 45%, #120c08 100%);
    min-height:100vh;
    padding:34px 20px 48px;
    -webkit-font-smoothing:antialiased;
  }
  .grain{position:fixed;inset:0;pointer-events:none;opacity:.05;mix-blend-mode:overlay;
    background:repeating-linear-gradient(115deg,#fff 0 1px,transparent 1px 3px);}
  .wrap{max-width:780px;margin:0 auto;position:relative}

  .topline{height:2px;background:linear-gradient(90deg,transparent,var(--brass-lo) 12%,var(--brass) 50%,var(--brass-lo) 88%,transparent);opacity:.7;margin-bottom:26px;border-radius:2px}

  header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:30px}
  .mark{font-family:'Fraunces',serif;font-weight:500;font-size:27px;letter-spacing:.02em;color:var(--cream);line-height:1}
  .mark .dot{color:var(--oxblood)}
  .mark small{display:block;font-family:'Instrument Sans',sans-serif;font-weight:500;font-size:10.5px;letter-spacing:.34em;color:var(--ink-muted);margin-top:7px;text-transform:uppercase}
  .month{font-family:'Fraunces',serif;font-size:15px;color:var(--cream);border:1px solid rgba(198,164,92,.4);border-radius:7px;padding:8px 14px;display:flex;align-items:center;gap:9px;background:rgba(198,164,92,.05)}
  .month::after{content:"";width:6px;height:6px;border-right:1.5px solid var(--brass);border-bottom:1.5px solid var(--brass);transform:rotate(45deg) translateY(-2px)}

  .cluster{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-bottom:30px}
  .instr{flex:1 1 210px;max-width:236px;background:linear-gradient(180deg,var(--wood-2),var(--wood-1));border:1px solid rgba(0,0,0,.5);border-radius:16px;padding:20px 16px 22px;text-align:center;box-shadow:inset 0 1px 0 rgba(232,208,154,.09), 0 10px 26px rgba(0,0,0,.4)}
  .dialwrap{width:172px;height:172px;margin:0 auto 6px}
  .val{font-family:'Fraunces',serif;font-weight:500;font-size:33px;color:var(--cream);font-variant-numeric:tabular-nums lining-nums;line-height:1.05;margin-top:2px}
  .lab{font-size:10.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--ink-muted);margin-top:7px}
  .sub{font-size:11.5px;color:var(--ink-muted);opacity:.8;margin-top:5px;font-style:italic;font-family:'Fraunces',serif}

  .panel{background:linear-gradient(180deg,var(--wood-2),var(--wood-1));border:1px solid rgba(0,0,0,.5);border-radius:16px;padding:22px 24px 24px;box-shadow:inset 0 1px 0 rgba(232,208,154,.08),0 10px 26px rgba(0,0,0,.35)}
  .panel h2{font-family:'Fraunces',serif;font-weight:500;font-size:18px;color:var(--cream);display:flex;align-items:baseline;justify-content:space-between}
  .panel h2 span{font-family:'Instrument Sans',sans-serif;font-size:10.5px;letter-spacing:.26em;text-transform:uppercase;color:var(--ink-muted)}
  .rule{height:1px;background:linear-gradient(90deg,var(--brass-lo),transparent);opacity:.5;margin:15px 0 18px}
  .row{display:grid;grid-template-columns:120px 1fr 74px;align-items:center;gap:14px;margin-bottom:14px}
  .row:last-child{margin-bottom:0}
  .rname{font-size:13.5px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .track{height:9px;background:rgba(0,0,0,.34);border-radius:5px;overflow:hidden;box-shadow:inset 0 1px 2px rgba(0,0,0,.5)}
  .fill{height:100%;border-radius:5px;background:linear-gradient(90deg,#6d2623,var(--oxblood));width:0;transition:width 1s cubic-bezier(.22,1,.36,1)}
  .rval{font-family:'Fraunces',serif;font-size:15px;text-align:right;color:var(--cream);font-variant-numeric:tabular-nums lining-nums}

  @media (prefers-reduced-motion:reduce){.fill{transition:none}}
</style>
</head>
<body>
<div class="grain"></div>
<div class="wrap">
  <div class="topline"></div>

  <header>
    <div class="mark">Fin Dash<span class="dot">.</span><small>June 2026 · demo account</small></div>
    <div class="month">June 2026</div>
  </header>

  <section class="cluster" id="cluster"></section>

  <section class="panel">
    <h2>Spending by category <span>June 2026</span></h2>
    <div class="rule"></div>
    <div id="cats"></div>
  </section>
</div>

<script>
  const pt=(cx,cy,r,deg)=>{const a=deg*Math.PI/180;return[cx+r*Math.cos(a),cy+r*Math.sin(a)];};
  const arcPath=(cx,cy,r,a0,a1)=>{const[x0,y0]=pt(cx,cy,r,a0),[x1,y1]=pt(cx,cy,r,a1);const big=(a1-a0)>180?1:0;return`M ${x0.toFixed(2)} ${y0.toFixed(2)} A ${r} ${r} 0 ${big} 1 ${x1.toFixed(2)} ${y1.toFixed(2)}`;};
  const START=135, SPAN=270;

  const gauges=[
    {label:'Spend', val:919.68, max:3000, accent:'#8a3330', sub:'of $3,000 budget'},
    {label:'Income', val:2500, max:3000, accent:'#4e806a', sub:'monthly salary'},
    {label:'Net', val:1580.32, max:3000, accent:'#c6a45c', sub:'saved this month'},
  ];
  const money=n=>'$'+Math.round(n).toLocaleString();
  const reduce=window.matchMedia('(prefers-reduced-motion:reduce)').matches;

  function dialSVG(g){
    const cx=86,cy=86, arcR=68, faceR=54, needleLen=62;
    let ticks='';
    for(let i=0;i<=10;i++){
      const deg=START+(i/10)*SPAN;
      const outer=pt(cx,cy,arcR+4,deg), inner=pt(cx,cy,arcR-(i%5===0?9:4),deg);
      ticks+=`<line x1="${inner[0].toFixed(1)}" y1="${inner[1].toFixed(1)}" x2="${outer[0].toFixed(1)}" y2="${outer[1].toFixed(1)}" stroke="${i%5===0?'#8a6d34':'#5a4a2c'}" stroke-width="${i%5===0?2:1.2}" stroke-linecap="round"/>`;
    }
    return `<svg viewBox="0 0 172 172" width="172" height="172" role="img" aria-label="${g.label} gauge">
      <defs>
        <linearGradient id="bez-${g.label}" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#e8d09a"/><stop offset=".5" stop-color="#b48f45"/><stop offset="1" stop-color="#7a5f2e"/>
        </linearGradient>
        <radialGradient id="face-${g.label}" cx="50%" cy="42%" r="65%">
          <stop offset="0" stop-color="#f2e8d2"/><stop offset="1" stop-color="#d8c8a4"/>
        </radialGradient>
      </defs>
      <circle cx="${cx}" cy="${cy}" r="82" fill="url(#bez-${g.label})"/>
      <circle cx="${cx}" cy="${cy}" r="76" fill="#1c130d"/>
      <circle cx="${cx}" cy="${cy}" r="${faceR}" fill="url(#face-${g.label})"/>
      ${ticks}
      <path d="${arcPath(cx,cy,arcR,START,START+SPAN)}" fill="none" stroke="#00000022" stroke-width="6" stroke-linecap="round"/>
      <path class="varc" d="" fill="none" stroke="${g.accent}" stroke-width="6" stroke-linecap="round"/>
      <line class="needle" x1="${cx}" y1="${cy}" x2="${cx}" y2="${cy}" stroke="#2a1c12" stroke-width="3" stroke-linecap="round"/>
      <circle cx="${cx}" cy="${cy}" r="7" fill="url(#bez-${g.label})" stroke="#5a4a2c" stroke-width="1"/>
      <circle cx="${cx}" cy="${cy}" r="2.5" fill="#2a1c12"/>
    </svg>`;
  }

  const cluster=document.getElementById('cluster');
  gauges.forEach(g=>{
    const card=document.createElement('div');
    card.className='instr';
    card.innerHTML=`<div class="dialwrap">${dialSVG(g)}</div><div class="val">${money(g.val)}</div><div class="lab">${g.label}</div><div class="sub">${g.sub}</div>`;
    cluster.appendChild(card);
    const svg=card.querySelector('svg'), cx=86,cy=86,arcR=68,needleLen=62;
    const frac=Math.min(g.val/g.max,1);
    const draw=f=>{
      svg.querySelector('.varc').setAttribute('d',arcPath(cx,cy,arcR,START,START+f*SPAN));
      const[nx,ny]=pt(cx,cy,needleLen,START+f*SPAN);
      const n=svg.querySelector('.needle');n.setAttribute('x2',nx.toFixed(2));n.setAttribute('y2',ny.toFixed(2));
    };
    if(reduce){draw(frac);}
    else{
      const t0=performance.now(),dur=1000;
      const ease=x=>1-Math.pow(1-x,3);
      const step=t=>{const p=Math.min((t-t0)/dur,1);draw(ease(p)*frac);if(p<1)requestAnimationFrame(step);};
      requestAnimationFrame(step);
    }
  });

  const cats=[
    ['Uncategorized',412.20],['Groceries',147.05],['Shopping',115.95],
    ['Utilities',95.00],['Transport',83.40],['Dining',40.10],['Subscriptions',25.98]
  ];
  const cmax=Math.max(...cats.map(c=>c[1]));
  const catBox=document.getElementById('cats');
  cats.forEach(([name,v],i)=>{
    const row=document.createElement('div');row.className='row';
    row.innerHTML=`<div class="rname">${name}</div><div class="track"><div class="fill"></div></div><div class="rval">$${v.toFixed(2)}</div>`;
    catBox.appendChild(row);
    const fill=row.querySelector('.fill');
    const w=(v/cmax*100).toFixed(1)+'%';
    if(reduce){fill.style.width=w;}
    else{setTimeout(()=>{fill.style.width=w;},120+i*70);}
  });
</script>
</body>
</html>
