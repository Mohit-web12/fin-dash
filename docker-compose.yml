services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-1440}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      SEED_USER_EMAIL: ${SEED_USER_EMAIL:-demo@example.com}
      SEED_USER_PASSWORD: ${SEED_USER_PASSWORD:-changeme123}
    volumes:
      - backend_data:/app/data

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  backend_data:
